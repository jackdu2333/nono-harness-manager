name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-and-rust:
    name: Frontend + Rust checks
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Frontend build
        run: npm run build

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build harness_cli
        working-directory: src-tauri
        run: cargo build --bin harness_cli
